<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio do Marcelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; }
        h1, h2, h3 { font-family: 'Merriweather', serif; }
        .admin-ativo { display: block !important; }
    </style>
</head>
<body class="text-slate-800 antialiased pb-24">

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-sm border-b border-slate-200 z-50">
        <div class="max-w-4xl mx-auto px-6 py-5">
            <div class="flex justify-between items-center mb-5">
                <h1 class="text-2xl font-bold text-slate-900">Portfólio do Marcelo</h1>
                <button id="btn-add-materia" onclick="abrirModal()" class="hidden bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 shadow-lg transition-all">
                    + Adicionar Matéria
                </button>
            </div>
            <nav class="overflow-x-auto no-scrollbar">
                <ul id="menu-navegacao" class="flex md:flex-wrap justify-start gap-5 md:gap-7 w-max md:w-auto pb-2"></ul>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal" class="max-w-3xl mx-auto px-6 pt-48">
        <div id="loading" class="text-center text-slate-400 italic">Carregando conteúdos...</div>
    </main>

    <div id="barra-login" class="fixed bottom-0 left-0 w-full bg-slate-900 text-white p-4 z-[100] transition-transform translate-y-full">
        <div class="max-w-xl mx-auto flex flex-col gap-3">
            <p class="text-xs text-slate-400">Olá Marcelo, cole seu Token do GitHub para liberar a edição:</p>
            <div class="flex gap-2">
                <input type="password" id="input-token" placeholder="Cole o token aqui..." class="flex-1 bg-slate-800 border-none p-2 rounded text-sm text-white outline-none focus:ring-2 ring-blue-500">
                <button onclick="salvarToken()" class="bg-blue-600 px-4 py-2 rounded text-sm font-bold">Entrar</button>
                <button onclick="exibirLogin(false)" class="text-slate-500 text-xs px-2">Fechar</button>
            </div>
        </div>
    </div>

    <button id="btn-lock" onclick="exibirLogin(true)" class="fixed bottom-6 right-6 w-12 h-12 bg-white shadow-xl border border-slate-200 rounded-full flex items-center justify-center text-xl hover:scale-110 transition-all z-50">🔑</button>

    <div id="modal-cadastro" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-[110] p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Cadastrar Nova Matéria</h2>
            
            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Nome da Disciplina</label>
            <input type="text" id="form-nome" placeholder="Ex: Matemática" class="w-full border border-slate-200 p-3 rounded-xl mb-4 outline-none focus:border-blue-500">
            
            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Descrição do Trabalho</label>
            <textarea id="form-texto" placeholder="O que você estudou nesta matéria?" class="w-full border border-slate-200 p-3 rounded-xl mb-6 h-40 outline-none focus:border-blue-500"></textarea>
            
            <div class="flex gap-3">
                <button onclick="registrarMateria()" id="btn-finalizar" class="bg-blue-600 text-white flex-1 py-3 rounded-xl font-bold hover:bg-blue-700">Salvar Matéria</button>
                <button onclick="fecharModal()" class="bg-slate-100 text-slate-500 flex-1 py-3 rounded-xl">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DO GITHUB
        const GITHUB = {
            usuario: 'marcossc-beep', 
            repo: 'portifolio_marcelo',
            arquivo: 'materias.json'
        };

        let dadosAtuais = [];
        let shaArquivo = '';

        async function init() {
            verificarStatusAdmin();
            await buscarDados();
        }

        // Função para os acentos funcionarem no GitHub (UTF-8)
        function paraBase64(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => {
                return String.fromCharCode('0x' + p1);
            }));
        }

        function verificarStatusAdmin() {
            const token = localStorage.getItem('token_marcelo');
            if (token) {
                document.getElementById('btn-add-materia').classList.add('admin-ativo');
                document.getElementById('btn-lock').style.display = 'none';
            }
        }

        function salvarToken() {
            const token = document.getElementById('input-token').value;
            if (token) {
                localStorage.setItem('token_marcelo', token);
                location.reload();
            }
        }

        function exibirLogin(show) {
            document.getElementById('barra-login').style.transform = show ? 'translateY(0)' : 'translateY(100%)';
        }

        async function buscarDados() {
            try {
                const url = `https://api.github.com/repos/${GITHUB.usuario}/${GITHUB.repo}/contents/${GITHUB.arquivo}`;
                const resposta = await fetch(url);
                const data = await resposta.json();
                
                shaArquivo = data.sha;
                // Decodifica tratando acentos
                dadosAtuais = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                desenharInterface(dadosAtuais);
            } catch (e) {
                document.getElementById('loading').innerText = "Erro ao carregar matérias.";
            }
        }

        function desenharInterface(lista) {
            const menu = document.getElementById('menu-navegacao');
            const main = document.getElementById('conteudo-principal');
            const isAdmin = localStorage.getItem('token_marcelo');
            
            menu.innerHTML = ''; main.innerHTML = '';

            lista.forEach((item, i) => {
                menu.innerHTML += `<li><a href="#${item.id}" class="text-sm font-medium text-slate-500 hover:text-slate-900">${item.nome}</a></li>`;
                
                main.innerHTML += `
                    <section id="${item.id}" class="mb-14 bg-white rounded-2xl p-8 border border-slate-100 relative group shadow-sm">
                        ${isAdmin ? `<button onclick="removerMateria(${i})" class="absolute top-4 right-4 text-red-300 hover:text-red-600 font-bold text-xs">Excluir 🗑️</button>` : ''}
                        <h2 class="text-2xl font-bold text-slate-900 mb-4">${item.nome}</h2>
                        <p class="text-lg leading-relaxed text-slate-600">${item.texto}</p>
                    </section>
                `;
            });
        }

        async function enviarParaGitHub(conteudo) {
            const token = localStorage.getItem('token_marcelo');
            const btn = document.getElementById('btn-finalizar');
            btn.innerText = "Salvando...";
            btn.disabled = true;

            const url = `https://api.github.com/repos/${GITHUB.usuario}/${GITHUB.repo}/contents/${GITHUB.arquivo}`;
            const body = {
                message: "Atualização de matéria",
                content: paraBase64(JSON.stringify(conteudo, null, 2)),
                sha: shaArquivo
            };

            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify(body)
            });

            if(res.ok) {
                location.reload();
            } else {
                alert("Erro ao salvar! O seu Token pode ter expirado.");
                localStorage.removeItem('token_marcelo');
                location.reload();
            }
        }

        function registrarMateria() {
            const n = document.getElementById('form-nome').value;
            const t = document.getElementById('form-texto').value;
            if(!n || !t) return alert("Preencha todos os campos!");

            const nova = { id: 'id-' + Date.now(), nome: n, texto: t };
            dadosAtuais.push(nova);
            enviarParaGitHub(dadosAtuais);
        }

        function removerMateria(index) {
            if(confirm("Deseja apagar esta disciplina?")) {
                dadosAtuais.splice(index, 1);
                enviarParaGitHub(dadosAtuais);
            }
        }

        function abrirModal() { document.getElementById('modal-cadastro').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal-cadastro').style.display = 'none'; }

        init();
    </script>
</body>
</html>
