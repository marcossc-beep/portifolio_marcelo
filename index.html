<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f6;
        }
        h1, h2, h3 { font-family: 'Merriweather', serif; }
        *:focus {
            outline: 3px solid #94a3b8 !important;
            outline-offset: 3px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-slate-200">

    <a href="#conteudo-principal" 
       class="absolute left-4 -top-16 focus:top-4 bg-slate-800 text-white px-4 py-2 rounded-md z-[100] transition-all text-sm">
        Pular para o conteúdo principal
    </a>

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-sm border-b border-slate-200 z-50">
        <div class="max-w-4xl mx-auto px-6 py-5">
            <h1 class="text-2xl font-bold text-slate-900 mb-5 text-center md:text-left">Portfólio do Marcelo - Primeiro Trimestre</h1>
            
            <nav aria-label="Navegação por Disciplinas" class="overflow-x-auto no-scrollbar">
                <ul id="menu-navegacao" class="flex md:flex-wrap justify-start gap-5 md:gap-7 w-max md:w-auto pb-2 md:pb-0">
                    <!-- Menu gerado via JavaScript -->
                </ul>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal" class="max-w-3xl mx-auto px-6 pt-48 pb-24">
        <!-- Conteúdo gerado via JavaScript -->
    </main>

    <footer class="text-slate-400 py-12 text-center text-sm">
        <p>Portfólio Escolar - Conteúdo Dinâmico</p>
    </footer>

    <script>
        // LISTA DE DISCIPLINAS (O Marcelo edita apenas aqui)
        const disciplinas = [
            {
                id: "biologia",
                nome: "Biologia",
                texto: "O trabalho de biologia foi um trabalho proposto pela professora que pediu para fazer uma pesquisa sobre o sistema locomotor."
            },
            {
                id: "educacao-fisica",
                nome: "Educação Física",
                texto: "O trabalho de educação física foi uma proposta do professor para a turma fazer um trabalho sobre lazer. Nós fizemos algumas atividades na sala e algumas na quadra."
            },
            {
                id: "filosofia",
                nome: "Filosofia",
                texto: "O trabalho de filosofia foi uma proposta da professora que pediu pra turma se dividir em grupos e era para a gente falar sobre os filósofos iluministas."
            },
            {
                id: "fisica",
                nome: "Física",
                texto: "Este trabalho consistiu na construção de um aquecedor solar, dividido em etapas de construção, manual técnico e registro em vídeo."
            },
            {
                id: "projeto-vida",
                nome: "Projeto de Vida",
                atividades: [
                    { titulo: "Atividade 1", desc: "Trabalho em grupo sobre estatutos sociais." },
                    { titulo: "Atividade 2", desc: "Pesquisa em dupla sobre estereótipos na sociedade atual." }
                ]
            }
        ];

        const menuContainer = document.getElementById('menu-navegacao');
        const mainContainer = document.getElementById('conteudo-principal');

        function renderizarSite() {
            menuContainer.innerHTML = '';
            mainContainer.innerHTML = '';

            disciplinas.forEach(disciplina => {
                // 1. Criar item do Menu
                const li = document.createElement('li');
                li.innerHTML = `<a href="#${disciplina.id}" class="text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors">${disciplina.nome}</a>`;
                menuContainer.appendChild(li);

                // 2. Criar Seção de Conteúdo
                const section = document.createElement('section');
                section.id = disciplina.id;
                section.className = "mb-14 scroll-mt-40";

                let conteudoInterno = '';

                if (disciplina.atividades) {
                    // Se a disciplina tiver múltiplas atividades (como Projeto de Vida)
                    const cardsAtividades = disciplina.atividades.map(atv => `
                        <article class="p-6 bg-[#faf9f6] rounded-xl border border-slate-100/50">
                            <h3 class="text-lg font-bold text-slate-800 mb-2">${atv.titulo}</h3>
                            <p class="text-slate-600 leading-relaxed">${atv.desc}</p>
                        </article>
                    `).join('');

                    conteudoInterno = `
                        <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                            <h2 class="text-2xl font-bold text-slate-900 mb-8">${disciplina.nome}</h2>
                            <div class="space-y-6">${cardsAtividades}</div>
                        </div>
                    `;
                } else {
                    // Se for uma disciplina simples
                    conteudoInterno = `
                        <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                            <h2 class="text-2xl font-bold text-slate-900 mb-4">${disciplina.nome}</h2>
                            <p class="text-lg leading-relaxed text-slate-600">${disciplina.texto}</p>
                        </div>
                    `;
                }

                section.innerHTML = conteudoInterno;
                mainContainer.appendChild(section);
            });
        }

        renderizarSite();
    </script>
</body>
</html>
