<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio do Marcelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; }
        h1, h2, h3 { font-family: 'Merriweather', serif; }
    </style>
</head>
<body class="text-slate-800 antialiased pb-24">

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-sm border-b border-slate-200 z-50">
        <div class="max-w-4xl mx-auto px-6 py-5">
            <div class="flex justify-between items-center mb-5">
                <h1 class="text-2xl font-bold text-slate-900">Portfólio do Marcelo</h1>
                <button onclick="abrirFluxoEdicao()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold hover:bg-blue-700 shadow-md transition-all">
                    Adicionar novo conteúdo
                </button>
            </div>
            <nav class="overflow-x-auto no-scrollbar">
                <ul id="menu-navegacao" class="flex md:flex-wrap justify-start gap-5 md:gap-7 w-max md:w-auto pb-2"></ul>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal" class="max-w-3xl mx-auto px-6 pt-48">
        <div id="loading-box" class="text-center text-slate-400 italic">Carregando portfólio...</div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-[110] p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full shadow-2xl relative">
            <button onclick="fecharModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            
            <div id="etapa-token" class="hidden">
                <h2 class="text-xl font-bold mb-2">Acesso Restrito</h2>
                <p class="text-sm text-slate-500 mb-6">Cole seu Token do GitHub para liberar a edição.</p>
                <input type="password" id="input-token" placeholder="Cole seu token aqui..." class="w-full border border-slate-200 p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-blue-100">
                <button onclick="salvarToken()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all">Validar e Continuar</button>
            </div>

            <div id="etapa-materia" class="hidden">
                <h2 class="text-xl font-bold mb-6">Nova Matéria</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Título da Disciplina</label>
                        <input type="text" id="form-nome" placeholder="Ex: Biologia" class="w-full border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-100">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Conteúdo/Texto</label>
                        <textarea id="form-texto" placeholder="Descreva o que foi feito..." class="w-full border border-slate-200 p-4 rounded-2xl h-40 outline-none focus:ring-2 ring-blue-100"></textarea>
                    </div>
                    <button id="btn-salvar-final" onclick="executarCadastro()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">Publicar no Site</button>
                    <button onclick="limparToken()" class="w-full text-red-400 text-xs mt-2 hover:underline">Sair / Trocar Token</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'marcossc-beep'; 
        const REPO_NAME = 'portifolio_marcelo';
        const FILE_PATH = 'materias.json';

        let listaMaterias = [];
        let shaAtual = '';

        async function carregar() {
            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
                const res = await fetch(url);
                const data = await res.json();
                shaAtual = data.sha;
                // Decodifica JSON tratando acentos corretamente
                const decodedContent = decodeURIComponent(escape(atob(data.content)));
                listaMaterias = JSON.parse(decodedContent);
                renderizarSite();
            } catch (e) {
                const lb = document.getElementById('loading-box');
                if(lb) lb.innerText = "Erro ao carregar matérias.";
                console.error(e);
            }
        }

        function renderizarSite() {
            const menu = document.getElementById('menu-navegacao');
            const main = document.getElementById('conteudo-principal');
            const loadingBox = document.getElementById('loading-box');
            const temToken = localStorage.getItem('marcelo_token');
            
            if(menu) menu.innerHTML = ''; 
            if(main) main.innerHTML = '';

            listaMaterias.forEach((m, index) => {
                if(menu) menu.innerHTML += `<li><a href="#materia-${index}" class="text-sm font-medium text-slate-500 hover:text-slate-900">${m.nome}</a></li>`;
                
                if(main) main.innerHTML += `
                    <section id="materia-${index}" class="mb-14 bg-white rounded-3xl p-8 border border-slate-100 relative group shadow-sm hover:shadow-md transition-all">
                        ${temToken ? `<button onclick="deletarMateria(${index})" class="absolute top-6 right-6 text-red-300 hover:text-red-600 font-bold text-xs uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full transition-colors">Deletar 🗑️</button>` : ''}
                        <h2 class="text-2xl font-bold text-slate-900 mb-4">${m.nome}</h2>
                        <p class="text-lg leading-relaxed text-slate-600">${m.texto}</p>
                    </section>
                `;
            });
            if(loadingBox) loadingBox.style.display = 'none';
        }

        function abrirFluxoEdicao() {
            const modal = document.getElementById('modal');
            const token = localStorage.getItem('marcelo_token');
            if(modal) modal.style.display = 'flex';

            if (!token) {
                document.getElementById('etapa-token').classList.remove('hidden');
                document.getElementById('etapa-materia').classList.add('hidden');
            } else {
                document.getElementById('etapa-token').classList.add('hidden');
                document.getElementById('etapa-materia').classList.remove('hidden');
            }
        }

        function salvarToken() {
            const token = document.getElementById('input-token').value.trim();
            if (token) {
                localStorage.setItem('marcelo_token', token);
                abrirFluxoEdicao(); 
                renderizarSite(); 
            }
        }

        function limparToken() {
            localStorage.removeItem('marcelo_token');
            location.reload();
        }

        async function enviarParaGithub(novaLista) {
            const token = localStorage.getItem('marcelo_token');
            const btn = document.getElementById('btn-salvar-final');
            if(btn) { btn.innerText = "Salvando..."; btn.disabled = true; }

            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            
            // Corrige o problema de acentos no Base64
            const jsonString = JSON.stringify(novaLista, null, 2);
            const contentBase64 = btoa(unescape(encodeURIComponent(jsonString)));

            try {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Atualização via site",
                        content: contentBase64,
                        sha: shaAtual
                    })
                });

                if (res.ok) {
                    location.reload();
                } else {
                    alert("Erro ao salvar! Verifique se seu token tem permissão de 'repo'.");
                    if(btn) { btn.innerText = "Publicar no Site"; btn.disabled = false; }
                }
            } catch(e) {
                alert("Erro de conexão.");
                if(btn) { btn.innerText = "Publicar no Site"; btn.disabled = false; }
            }
        }

        function executarCadastro() {
            const nome = document.getElementById('form-nome').value;
            const texto = document.getElementById('form-texto').value;
            if(!nome || !texto) return alert("Preencha o título e o conteúdo!");

            listaMaterias.push({ nome: nome, texto: texto });
            enviarParaGithub(listaMaterias);
        }

        function deletarMateria(index) {
            if (confirm(`Tem certeza que deseja apagar a matéria "${listaMaterias[index].nome}"?`)) {
                listaMaterias.splice(index, 1);
                enviarParaGithub(listaMaterias);
            }
        }

        function fecharModal() { document.getElementById('modal').style.display = 'none'; }
        
        carregar();
    </script>
</body>
</html>
