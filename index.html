<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio do Marcelo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; }
        h1, h2, h3 { font-family: 'Merriweather', serif; }
    </style>
</head>
<body class="text-slate-800 antialiased pb-24">

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-sm border-b border-slate-200 z-50">
        <div class="max-w-4xl mx-auto px-6 py-5">
            <div class="flex justify-between items-center mb-5">
                <h1 class="text-2xl font-bold text-slate-900">Portfólio do Marcelo</h1>
                <button onclick="abrirModal()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold hover:bg-blue-700 shadow-md transition-all">
                    Adicionar novo conteúdo
                </button>
            </div>
            <nav class="overflow-x-auto no-scrollbar">
                <ul id="menu-navegacao" class="flex md:flex-wrap justify-start gap-5 md:gap-7 w-max md:w-auto pb-2"></ul>
            </nav>
        </div>
    </header>

    <main id="conteudo-principal" class="max-w-3xl mx-auto px-6 pt-48">
        <div id="loading-box" class="text-center text-slate-400 italic">Carregando portfólio...</div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-[110] p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full shadow-2xl relative">
            <button onclick="fecharModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            
            <div>
                <h2 class="text-xl font-bold mb-6">Nova Matéria</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Título da Disciplina</label>
                        <input type="text" id="form-nome" placeholder="Ex: Biologia" class="w-full border border-slate-200 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-100">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Conteúdo/Texto</label>
                        <textarea id="form-texto" placeholder="Descreva o que foi feito..." class="w-full border border-slate-200 p-4 rounded-2xl h-40 outline-none focus:ring-2 ring-blue-100"></textarea>
                    </div>
                    <button onclick="executarCadastro()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">Publicar no Site</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados padrão caso o navegador ainda não tenha nada salvo
        const materiasPadrao = [
            { nome: "História", texto: "Análise sobre as grandes navegações e o impacto do comércio transatlântico no século XVI." },
            { nome: "Matemática", texto: "Estudo prático de funções afins e quadráticas aplicadas à análise de gráficos financeiros." }
        ];

        // Carrega do LocalStorage ou usa os dados padrão
        let listaMaterias = JSON.parse(localStorage.getItem('marcelo_materias')) || materiasPadrao;

        function carregar() {
            renderizarSite();
        }

        function salvarDados() {
            localStorage.setItem('marcelo_materias', JSON.stringify(listaMaterias));
        }

        function renderizarSite() {
            const menu = document.getElementById('menu-navegacao');
            const main = document.getElementById('conteudo-principal');
            const loadingBox = document.getElementById('loading-box');
            
            if(menu) menu.innerHTML = ''; 
            if(main) main.innerHTML = '';

            if (listaMaterias.length === 0) {
                if(main) main.innerHTML = `<div class="text-center text-slate-400 italic py-12">Nenhum conteúdo cadastrado ainda.</div>`;
            } else {
                listaMaterias.forEach((m, index) => {
                    if(menu) menu.innerHTML += `<li><a href="#materia-${index}" class="text-sm font-medium text-slate-500 hover:text-slate-900">${m.nome}</a></li>`;
                    
                    if(main) main.innerHTML += `
                        <section id="materia-${index}" class="mb-14 bg-white rounded-3xl p-8 border border-slate-100 relative group shadow-sm hover:shadow-md transition-all">
                            <button onclick="deletarMateria(${index})" class="absolute top-6 right-6 text-red-300 hover:text-red-600 font-bold text-xs uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full transition-colors">Deletar 🗑️</button>
                            <h2 class="text-2xl font-bold text-slate-900 mb-4">${m.nome}</h2>
                            <p class="text-lg leading-relaxed text-slate-600">${m.texto}</p>
                        </section>
                    `;
                });
            }
            if(loadingBox) loadingBox.style.display = 'none';
        }

        function abrirModal() {
            const modal = document.getElementById('modal');
            if(modal) modal.style.display = 'flex';
        }

        function fecharModal() { 
            document.getElementById('modal').style.display = 'none'; 
            // Limpa os campos do formulário ao fechar
            document.getElementById('form-nome').value = '';
            document.getElementById('form-texto').value = '';
        }

        function executarCadastro() {
            const nome = document.getElementById('form-nome').value.trim();
            const texto = document.getElementById('form-texto').value.trim();
            
            if(!nome || !texto) return alert("Preencha o título e o conteúdo!");

            listaMaterias.push({ nome: nome, texto: texto });
            salvarDados();
            renderizarSite();
            fecharModal();
        }

        function deletarMateria(index) {
            if (confirm(`Tem certeza que deseja apagar a matéria "${listaMaterias[index].nome}"?`)) {
                listaMaterias.splice(index, 1);
                salvarDados();
                renderizarSite();
            }
        }
        
        // Inicializa o site ao carregar a página
        carregar();
    </script>
</body>
</html>
